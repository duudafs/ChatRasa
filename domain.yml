version: "3.1"

intents:
  - greet
  - say_name
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - cotacao_dolar
  - preco_servico
  - valor_sessao        
  - ask_confirmation    
  - confirm_schedule
  - yourewelcome

entities:
  - name
  - servico

slots:
  name:
    type: text
    mappings:
    - type: from_entity
      entity: name

  servico:
    type: text
    mappings:
    - type: from_entity
      entity: servico

responses:
  utter_greet:
  - text: "Hello! How are you?"
  - text: "Oii, sou a assistente virtual! como posso te ajudar?"


  utter_cheer_up:
  - text: "Here is something to cheer you up:"
    image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_ask_name:
  - text: "Qual é seu nome?"

  utter_happy:
  - text: "Great!"

  utter_meeting:
  - text: "Prazer, {name}!!"

  utter_ask_confirmation:
  - text: "Deseja confirmar?"

  utter_confirmation:
  - text: "Okk! Confirmado!"

  utter_did_that_help:
  - text: "Precisa de mais alguma ajuda?"

  utter_goodbye:
  - text: "Tchauu {name}, até mais 💕"

  utter_iamabot:
  - text: "Me chamo Mellody 💫"

  utter_yourewelcome:
  - text: "De nada! Se precisar de mais alguma coisa, é só chamar!"

actions:
  - action_cotacao_dolar 
  - action_greet
  - action_preco_servico
  - action_yourewelcome

session_config:
  session_expiration_time: 180
  carry_over_slots_to_new_session: true
