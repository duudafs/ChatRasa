version: "3.1"

intents:
  - greet
  - say_name
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - cotacao_dolar

entities:
  - name

slots:
  name:
    type: text
    mappings:
    - type: from_entity
      entity: name

responses:
  utter_greet:
  - text: "Hello! How are you?"

  utter_cheer_up:
  - text: "Here is something to cheer you up:"
    image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_ask_name:
  - text: "What's your name?"

  utter_happy:
  - text: "Great!"

  utter_meeting:
  - text: "Nice to meet you, {name}"

  utter_did_that_help:
  - text: "Did that help you?"

  utter_goodbye:
  - text: "Bye"

  utter_iamabot:
  - text: "I am a bot, powered by Rasa."

actions:
  - action_cotacao_dolar 

session_config:
  session_expiration_time: 180
  carry_over_slots_to_new_session: true
