version: "3.1"

rules:

- rule: Greet and ask name
  steps:
  - intent: greet
  - action: utter_greet
  - action: utter_ask_name

- rule: Receive name
  steps:
  - intent: say_name
  - action: utter_meeting
  wait_for_user_input: false

- rule: Ask confirmation after saying the price of dolar
  steps: 
  - intent: ask_confirmation
  - action: utter_ask_confirmation

- rule: Confirm schedule when user says yes
  steps:
  - intent: confirm_schedule
  - action: utter_confirmation

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Answer cotacao dolar
  steps:
  - intent: cotacao_dolar
  - action: action_cotacao_dolar

- rule: Says the price when ask value
  steps:
  - intent: valor_sessao
  - action: action_preco_servico

- rule: Thank the user when they thank the bot
  steps:
  - intent: yourewelcome
  - action: utter_yourewelcome


 


